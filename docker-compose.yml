services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: marketing-backend
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    restart: unless-stopped
    networks:
      - marketing-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: marketing-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - marketing-network

  prometheus:
    image: prom/prometheus:latest
    container_name: marketing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - marketing-network

  grafana:
    image: grafana/grafana:latest
    container_name: marketing-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - marketing-network

networks:
  marketing-network:
    driver: bridge

volumes:
  grafana-data: