

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: marketing-backend
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    restart: unless-stopped
    networks:
      - marketing-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: marketing-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stoppeds
    networks:
      - marketing-network

networks:
  marketing-network:
    driver: bridge